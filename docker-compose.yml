services:
  clinical-doc-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-clinical-doc-agent:local
    container_name: clinical-doc-agent
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Optional: enables Claude-powered summarization
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Mount data read-only so adding protocols doesn't require a rebuild
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
